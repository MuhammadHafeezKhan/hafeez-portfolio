name: portfolio
description: "Hafeez Khan — Senior Flutter Developer & Team Lead. Personal portfolio."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^8.1.0
  flutter_svg: ^1.1.1+1
  url_launcher: ^6.3.2
  animated_text_kit: ^4.3.0
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/projects/
    - assets/skills/
    - assets/icons/

  fonts:
    - family: sfmono
      fonts:
        - asset: fonts/sfmono.otf
